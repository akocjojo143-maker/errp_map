            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);

<script>
setTimeout(function(){
 if(typeof layer_ERRP_07112026_5==="undefined") return;

 const types=["ANR","EMR","NR","EP","Miyawaki"];
 const stats={};
 let grand={sites:0,area:0};
 let gt={};
 types.forEach(t=>gt[t]={sites:0,area:0});

 layer_ERRP_07112026_5.eachLayer(function(l){
   const p=l.feature.properties||{};
   const m=(p.Municipal||"Unknown").trim();
   const t=(p.InterB||"Other").trim();
   const a=parseFloat(p.Area)||0;

   if(!stats[m]){
      stats[m]={sites:0,area:0};
      types.forEach(x=>stats[m][x]={sites:0,area:0});
   }

   stats[m].sites++;
   stats[m].area+=a;
   grand.sites++;
   grand.area+=a;

   if(stats[m][t]){
      stats[m][t].sites++;
      stats[m][t].area+=a;
      gt[t].sites++;
      gt[t].area+=a;
   }
 });

 const tbl=document.getElementById("summaryTable");
 tbl.innerHTML=`
 <thead>
 <tr>
 <th>Municipality</th>
 <th>Total<br>Sites</th>
 <th>Total<br>Area (ha)</th>

 <th>EP<br>Sites/Area</th>
 <th>Miyawaki<br>Sites/Area</th>
 </tr></thead><tbody></tbody><tfoot></tfoot>`;
 const body=tbl.querySelector("tbody");
 Object.keys(stats).sort().forEach(m=>{
   let r=`<tr><td>${m}</td><td>${stats[m].sites}</td><td>${stats[m].area.toFixed(2)}</td>`;
   types.forEach(t=>{
      const x=stats[m][t];
      r+=`<td>${x.sites} / ${x.area.toFixed(2)}</td>`;
   });
   r+="</tr>";
   body.insertAdjacentHTML("beforeend",r);
 });

 let f=`<tr style="font-weight:bold;background:#e8f5e9"><td>TOTAL</td><td>${grand.sites}</td><td>${grand.area.toFixed(2)}</td>`;
 types.forEach(t=>f+=`<td>${gt[t].sites} / ${gt[t].area.toFixed(2)}</td>`);
 f+="</tr>";
 tbl.querySelector("tfoot").innerHTML=f;
},800);
